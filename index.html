  <main id="main" class="page">
    <section class="homeHeroFull">
      <img class="homeHeroBg" src="images/heroimage.jpeg" alt="Coding background" />

      <div class="homeHeroOverlay">
        <h1 class="serifTitle homeHero__name">KATHERINE SANCHEZ</h1>

        <p class="homeHero__role">
          <em>Aspiring Web Developer | Front-End Developer</em>

  <script src="theme.js?v=2"></script>

  <style>
    .homeHeroFull{
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 74px - 72px);
    }

    .homeHeroBg{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .homeHeroFull::before{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.35) 0%,
        rgba(0,0,0,.18) 55%,
        rgba(0,0,0,.08) 100%
      );
      z-index:1;
    }

    .homeHeroOverlay{
      position: relative;
      z-index: 2;
      min-height: inherit;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 22px;
      padding: 60px 56px;
    }

    .homeHero__name{
      font-size: 88px;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 12px 30px rgba(0,0,0,.45);
      max-width: 10ch;
    }

    .homeHero__role{
      font-size: 30px;
      color: #ffffff;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow:
        0 6px 18px rgba(0,0,0,.55),
        0 2px 6px rgba(0,0,0,.35);
      max-width: 26ch;
      line-height: 1.4;
    }

    .homeHero__btn{
      width: fit-content;
      font-size: 24px;
      position: relative;
      border: 2px solid rgba(255,255,255,.75);
      background: rgba(157, 143, 132, .92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .homeHero__btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,.38);
      filter: brightness(1.05);
    }

    .homeHero__btn:active{
      transform: translateY(0) scale(.98);
      box-shadow: 0 10px 26px rgba(0,0,0,.30);
    }

    .homeHero__btn span{
      display: inline-block;
      font-size: 22px;
      transition: transform .18s ease;
    }

    .homeHero__btn:hover span{
      transform: translateX(6px);
    }

    @media (max-width: 900px){
      .homeHeroFull{
        min-height: calc(100vh - 140px);
      }

      .homeHeroOverlay{
        padding: 34px 20px 40px;
        justify-content: flex-end;
        gap: 16px;
      }

      .homeHero__name{
        font-size: 56px;
        max-width: 100%;
      }

      .homeHero__role{
        font-size: 18px;
        letter-spacing: 1px;
        max-width: 30ch;
      }

      .homeHero__btn{
        font-size: 18px;
      }

      .homeHero__btn span{
        font-size: 18px;
      }
    }

    @media (max-width: 700px){
      .homeHeroFull{
        min-height: calc(100vh - 150px);
      }
    }

    @media (max-width: 480px){
      .homeHeroFull{
        min-height: calc(100vh - 145px);
      }

      .homeHeroOverlay{
        padding: 24px 16px 28px;
        gap: 14px;
        justify-content: flex-end;
      }

      .homeHero__name{
        font-size: 38px;
        line-height: 1.05;
        max-width: 100%;
      }

      .homeHero__role{
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: .8px;
        max-width: 100%;
      }

      .homeHero__btn{
        width: 100%;
        justify-content: center;
        font-size: 16px;
        padding: 13px 18px;
      }
    }
  </style>
</body>
